<!doctype html>
<html lang="en">
  <head>

  <body>
    <!-- სექცია 1: Header / ნავიგაცია -->
    <header class="main-header">
      <div class="logo">SvanetiTravel</div>
      <nav>
        <ul class="nav-links">
          <li><a href="../index.html" class="">მთავარი</a></li>
          <li>
            <a href="../pages/about.html" class="">ჩვენს შესახებ</a>

          <li><a href="#" class="active">სერვისები</a></li>
          <li><a href="../pages/news.html">სიახლე</a></li>
          <li><a href="../pages/contact.html">კონტაქტი</a></li>
        </ul>
      </nav>
    </header>

    <main class="inner-page">
      <section class="services-list">
        <h1>ჩვენი სერვისები და მარშრუტები</h1>

        <div class="cards-grid">
          <!-- სერვისი 1: მარშრუტი -->
          <article class="route-card">
            <img src="koruldi.jpg" alt="ქორულდის ტბები" />
            <div class="card-info">
              <h2>ქორულდის ტბები</h2>
              <p>სირთულე: საშუალო | დრო: 6 სთ[cite: 1, 2]</p>
              <a href="#" class="btn-primary">დეტალურად ნახვა</a>
            </div>
          </article>

          <!-- სერვისი 2: სასტუმრო -->
          <article class="route-card">
            <img src="guesthouse.jpg" alt="საოჯახო სასტუმრო" />
            <div class="card-info">
              <h2>ლოკალური სასტუმროები</h2>
              <p>
                რეკომენდაციები მესტიაში არსებულ მცირე საოჯახო სასტუმროებზე[cite:
                1].
              </p>
              <a href="#" class="btn-primary">დეტალურად ნახვა</a>
            </div>
          </article>
        </div>
      </section>
    </main>
